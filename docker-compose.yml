services:
  redis:
    image: redis:7-alpine
    container_name: pkt-redis
    ports:
      - "127.0.0.1:6379:6379"
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  analyzer:
    build: ./analyzer
    container_name: pkt-analyzer
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      SRC_STREAM: raw_packets
      DST_STREAM: parsed_events
      GROUP: analyzer-cg
      CONSUMER: analyzer-1
      DST_MAXLEN: "100000"
      BATCH_SIZE: "100"
      BLOCK_MS: "5000"
      LOG_LEVEL: INFO
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: pkt-tsdb
    environment:
      POSTGRES_USER: pkt
      POSTGRES_PASSWORD: pkt
      POSTGRES_DB: pkt
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - tsdb-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pkt -d pkt"]
      interval: 5s
      timeout: 3s
      retries: 5

  aggregator:
    build: ./aggregator
    container_name: pkt-aggregator
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      PG_DSN: postgresql://pkt:pkt@timescaledb:5432/pkt
      SRC_STREAM: parsed_events
      GROUP: aggregator-cg
      CONSUMER: aggregator-1
      WINDOW_SECONDS: "10"
      GRACE_SECONDS: "5"
      BATCH_SIZE: "500"
      BLOCK_MS: "1000"
      LOG_LEVEL: INFO
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: pkt-grafana
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  tsdb-data:
  grafana-data:
